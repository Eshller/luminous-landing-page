    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#2563eb", // Electric Blue
              "primary-hover": "#1d4ed8",
              "background-main": "#ffffff", // Pure White
              "surface-light": "#f8fafc", // Very light grey/blue
              "surface-card": "#ffffff",
              "border-light": "#e2e8f0", // Slate 200
              "border-highlight": "#bfdbfe", // Blue 200
              "text-main": "#0f172a", // Slate 900 (Dark Navy)
              "text-subtle": "#64748b", // Slate 500
              "text-nav": "#334155", // Slate 700
            },
            fontFamily: {
              display: ["Inter Tight", "sans-serif"],
              body: ["Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
              editorial: ["Bodoni Moda", "serif"],
              luxury: ["Playfair Display", "serif"],
            },
            maxWidth: {
              page: "1280px",
            },
            animation: {
              "fade-in-up":
                "fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards",
              "pulse-glow": "pulseGlow 3s ease-in-out infinite",
              float: "float 10s ease-in-out infinite",
              "draw-svg": "drawSvg 2s ease-out forwards",
              shimmer: "shimmer 2.5s linear infinite",
              "stagger-lift": "staggerLift 0.5s ease-out forwards",
              "border-trace": "borderTrace 3s linear infinite",
              "spin-slow": "spinSlow 20s linear infinite",
              "spin-reverse-slow": "spinReverseSlow 25s linear infinite",
              blob: "blob 15s infinite",
              "blob-delay": "blob 15s infinite 5s",
            },
            keyframes: {
              fadeInUp: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              pulseGlow: {
                "0%, 100%": {
                  textShadow:
                    "0 0 10px rgba(37, 99, 235, 0.1), 0 0 20px rgba(37, 99, 235, 0)",
                },
                "50%": {
                  textShadow:
                    "0 0 15px rgba(37, 99, 235, 0.3), 0 0 30px rgba(37, 99, 235, 0.1)",
                },
              },
              float: {
                "0%, 100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-15px)" },
              },
              drawSvg: {
                "0%": { strokeDashoffset: "1000" },
                "100%": { strokeDashoffset: "0" },
              },
              shimmer: {
                "0%": { backgroundPosition: "-1000px 0" },
                "100%": { backgroundPosition: "1000px 0" },
              },
              staggerLift: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              borderTrace: {
                "0%": { backgroundPosition: "0% 50%" },
                "100%": { backgroundPosition: "100% 50%" },
              },
              spinSlow: {
                "0%": { transform: "rotate(0deg)" },
                "100%": { transform: "rotate(360deg)" },
              },
              spinReverseSlow: {
                "0%": { transform: "rotate(360deg)" },
                "100%": { transform: "rotate(0deg)" },
              },
              blob: {
                "0%": { transform: "translate(0px, 0px) scale(1)" },
                "33%": { transform: "translate(100px, -120px) scale(1.3)" },
                "66%": { transform: "translate(-50px, 50px) scale(0.8)" },
                "100%": { transform: "translate(0px, 0px) scale(1)" },
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
        background-color: #ffffff;
        color: #0f172a;
        font-family: "Inter", sans-serif;
      }
      .noise-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 50;
        opacity: 0.3;
        mix-blend-mode: overlay;
        background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDzpA2Q7zYCfS5qxy4mt_j0kmhDoFieFO4oqvs3L-VtKHxwhA5WilwI5dLg1iv5i1qKTrbK0D9VC8EW_7OwzCS_RALiICJQEiMHvKq5XGdLDkubDG3gGW4q_RbEGqj_I2W4CPtjk8Hyi9_6onPWQh4tNDnxHPUJXnKoBuGkvMWQY61MkLH8DcPZdTlvjFEwCBjSqcivoti4lUobUnnkoPgtO81N9GrGZmLIQVnkvSEVo-1s1K5AbLf4i1cs9JIZ49aEDdDVgibmOqw);
      }
      .signal-loom-bg-dynamic {
        background-image:
          radial-gradient(
            circle at 50% 50%,
            rgba(37, 99, 235, 0.08) 0%,
            transparent 50%
          ),
          linear-gradient(rgba(37, 99, 235, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(37, 99, 235, 0.03) 1px, transparent 1px);
        background-size:
          100% 100%,
          40px 40px,
          40px 40px;
        background-position:
          center,
          0 0,
          0 0;
        animation: panGrid 60s linear infinite;
      }
      @keyframes panGrid {
        0% {
          background-position:
            center,
            0 0,
            0 0;
        }
        100% {
          background-position:
            center,
            40px 40px,
            40px 40px;
        }
      }
      .particle-container {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #2563eb;
        border-radius: 50%;
        opacity: 0.2;
        animation: floatParticle 20s infinite linear;
      }
      @keyframes floatParticle {
        0% {
          transform: translateY(100vh) translateX(0);
          opacity: 0;
        }
        20% {
          opacity: 0.3;
        }
        80% {
          opacity: 0.3;
        }
        100% {
          transform: translateY(-100px) translateX(50px);
          opacity: 0;
        }
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .glass-bracket {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow:
          0 4px 30px rgba(0, 0, 0, 0.05),
          inset 0 0 20px rgba(37, 99, 235, 0.05);
        position: relative;
        overflow: hidden;
      }
      .glass-bracket::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 200%;
        height: 100%;
        background: linear-gradient(
          115deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
        animation: shimmer 4s infinite linear;
      }
      .card-cut-corner {
        clip-path: polygon(
          0 0,
          100% 0,
          100% calc(100% - 12px),
          calc(100% - 12px) 100%,
          0 100%
        );
        position: relative;
        transition:
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.3s ease;
      }
      .card-cut-corner::after {
        content: "";
        position: absolute;
        bottom: -1px;
        right: -1px;
        width: 14px;
        height: 14px;
        background: linear-gradient(
          135deg,
          transparent 52%,
          #bfdbfe 52%,
          #bfdbfe 56%,
          #fff 56%
        );
        pointer-events: none;
        z-index: 20;
      }
      .card-holographic::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          125deg,
          transparent 0%,
          transparent 40%,
          rgba(255, 255, 255, 0.4) 45%,
          rgba(191, 219, 254, 0.2) 50%,
          rgba(255, 255, 255, 0.4) 55%,
          transparent 60%,
          transparent 100%
        );
        background-size: 200% 200%;
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
        z-index: 5;
        mix-blend-mode: soft-light;
      }
      .group:hover .card-holographic::before {
        opacity: 1;
        animation: holoShine 1.5s ease-out forwards;
      }
      @keyframes holoShine {
        0% {
          background-position: 100% 100%;
        }
        100% {
          background-position: 0% 0%;
        }
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 20;
      }
      .btn-liquid {
        position: relative;
        overflow: hidden;
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn-liquid::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition:
          width 0.6s ease,
          height 0.6s ease;
        z-index: 0;
      }
      .btn-liquid:active::before {
        width: 300%;
        height: 300%;
      }
      .btn-liquid:hover {
        transform: translatey(-2px) scale(1.02);
      }
      /* REPLACED BAD ANIMATION WITH SLEEK SWEEP EFFECT */
      .btn-trace {
        position: relative;
        overflow: hidden;
        z-index: 1;
        background: white;
      }
      .btn-trace::after {
        content: "";
        position: absolute;
        top: 0;
        left: -150%;
        width: 150%;
        height: 100%;
        background: linear-gradient(
          115deg,
          transparent 40%,
          rgba(37, 99, 235, 0.1) 50%,
          transparent 60%
        );
        transform: skewX(-20deg);
        z-index: 1;
        transition: left 0s;
      }
      .btn-trace:hover::after {
        left: 150%;
        transition: left 0.6s ease;
      }
      .btn-trace:hover {
        border-color: #2563eb;
        color: #2563eb;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
      }
      .btn-cut {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", sans-serif;
        font-weight: 600;
        letter-spacing: 0.01em;
        text-transform: none;
        clip-path: polygon(
          0 0,
          calc(100% - 12px) 0,
          100% 12px,
          100% 100%,
          0 100%
        );
        isolation: isolate;
        cursor: pointer;
      }
      .btn-cut-content {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-cut-primary {
        height: 52px;
        background-color: #2563eb;
        color: white;
        box-shadow:
          0 4px 6px -1px rgba(37, 99, 235, 0.3),
          0 2px 4px -1px rgba(37, 99, 235, 0.15);
      }
      .btn-cut-primary::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.1) 0%,
          transparent 100%
        );
        z-index: 1;
        pointer-events: none;
      }
      .btn-cut-secondary {
        height: 52px;
        background-color: #fff;
        color: #0f172a;
        border: 1px solid #e2e8f0;
      }
      .btn-cut-secondary:hover {
        border-color: #2563eb;
        color: #2563eb;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
      }
      .btn-cut-nav {
        height: 42px !important;
        padding-left: 1.25rem;
        padding-right: 1.25rem;
        font-size: 0.8rem;
      }
      .arrow-nudge {
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn-cut:hover .arrow-nudge {
        transform: translatex(4px);
      }
      .draw-path {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: drawSvg 2s ease-out forwards;
        animation-play-state: paused;
      }
      .group:hover .draw-path,
      .in-view .draw-path {
        animation-play-state: running;
      }
      .grid-bg-parallax {
        background-image:
          linear-gradient(rgba(37, 99, 235, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(37, 99, 235, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
        perspective: 500px;
        transform-style: preserve-3d;
      }
      .depth-shadow {
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.02),
          0 4px 8px rgba(37, 99, 235, 0.04),
          0 12px 24px rgba(37, 99, 235, 0.04);
      }

      /* Advanced Hero Animations */
      @keyframes tilt3d {
        0% {
          transform: perspective(1000px) rotateX(10deg) scale(1.1);
        }
        50% {
          transform: perspective(1000px) rotateX(15deg) scale(1.15);
        }
        100% {
          transform: perspective(1000px) rotateX(10deg) scale(1.1);
        }
      }
      .animate-tilt-3d {
        animation: tilt3d 10s ease-in-out infinite;
      }

      @keyframes orbit-cw {
        from {
          transform: rotate(0deg) translateX(250px) rotate(0deg);
        }
        to {
          transform: rotate(360deg) translateX(250px) rotate(-360deg);
        }
      }
      .animate-orbit-cw {
        animation: orbit-cw 20s linear infinite;
      }

      @keyframes orbit-ccw {
        from {
          transform: rotate(360deg) translateX(180px) rotate(-360deg);
        }
        to {
          transform: rotate(0deg) translateX(180px) rotate(0deg);
        }
      }
      .animate-orbit-ccw {
        animation: orbit-ccw 25s linear infinite;
      }

      @keyframes grid-flow {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 0 40px;
        }
      }
      .animate-grid-flow {
        animation: grid-flow 3s linear infinite;
      }

      /* ========== INSANE BACKGROUND ANIMATIONS ========== */

      /* Floating Orbs */
      @keyframes floatSlow {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(30px, -40px) scale(1.05);
        }
        50% {
          transform: translate(-20px, -80px) scale(0.95);
        }
        75% {
          transform: translate(-40px, -30px) scale(1.02);
        }
      }
      .animate-float-slow {
        animation: floatSlow 20s ease-in-out infinite;
      }

      @keyframes floatDelayed {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(-50px, 30px) scale(1.1);
        }
        66% {
          transform: translate(40px, -40px) scale(0.9);
        }
      }
      .animate-float-delayed {
        animation: floatDelayed 25s ease-in-out infinite;
        animation-delay: -5s;
      }

      @keyframes floatReverse {
        0%,
        100% {
          transform: translate(0, 0) rotate(0deg) scale(1);
        }
        50% {
          transform: translate(60px, 40px) rotate(180deg) scale(1.15);
        }
      }
      .animate-float-reverse {
        animation: floatReverse 30s ease-in-out infinite;
      }

      /* Pulse Effects */
      @keyframes pulseSoft {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.2);
        }
      }
      .animate-pulse-soft {
        animation: pulseSoft 4s ease-in-out infinite;
      }
      .animate-pulse-delayed {
        animation: pulseSoft 4s ease-in-out infinite;
        animation-delay: -2s;
      }

      /* Grid Animations */
      @keyframes gridPan {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 60px 60px;
        }
      }
      .animate-grid-pan {
        animation: gridPan 20s linear infinite;
      }
      .animate-grid-pan-reverse {
        animation: gridPan 30s linear infinite reverse;
      }

      @keyframes gridDotPulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
          box-shadow: 0 0 10px 2px currentColor;
        }
        50% {
          opacity: 1;
          transform: scale(1.5);
          box-shadow: 0 0 30px 8px currentColor;
        }
      }
      .animate-grid-dot-pulse {
        animation: gridDotPulse 3s ease-in-out infinite;
      }
      .animate-grid-dot-pulse-delayed {
        animation: gridDotPulse 3s ease-in-out infinite;
        animation-delay: -1.5s;
      }

      /* Beam Animations */
      @keyframes beamVertical {
        0% {
          opacity: 0;
          transform: translateY(-100%);
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(100%);
        }
      }
      .animate-beam-vertical {
        animation: beamVertical 8s ease-in-out infinite;
      }
      .animate-beam-vertical-delayed {
        animation: beamVertical 8s ease-in-out infinite;
        animation-delay: -3s;
      }
      .animate-beam-vertical-slow {
        animation: beamVertical 12s ease-in-out infinite;
        animation-delay: -6s;
      }

      @keyframes beamDiagonal {
        0% {
          opacity: 0;
          transform: rotate(35deg) translateX(-100%);
        }
        20% {
          opacity: 0.5;
        }
        80% {
          opacity: 0.5;
        }
        100% {
          opacity: 0;
          transform: rotate(35deg) translateX(100%);
        }
      }
      .animate-beam-diagonal {
        animation: beamDiagonal 15s ease-in-out infinite;
      }
      .animate-beam-diagonal-delayed {
        animation: beamDiagonal 15s ease-in-out infinite;
        animation-delay: -7s;
      }

      /* Morph Animations */
      @keyframes morph1 {
        0%,
        100% {
          d: path(
            "M450,300 Q550,200 650,300 Q750,400 650,500 Q550,600 450,500 Q350,400 450,300"
          );
        }
        25% {
          d: path(
            "M480,280 Q600,180 680,320 Q780,450 620,520 Q500,620 420,480 Q320,380 480,280"
          );
        }
        50% {
          d: path(
            "M420,320 Q520,220 620,280 Q720,380 680,480 Q580,580 480,520 Q380,420 420,320"
          );
        }
        75% {
          d: path(
            "M460,260 Q580,160 700,300 Q800,440 640,540 Q520,640 400,500 Q300,360 460,260"
          );
        }
      }
      .animate-morph-1 {
        animation: morph1 20s ease-in-out infinite;
      }

      @keyframes morph2 {
        0%,
        100% {
          d: path(
            "M200,600 Q300,500 400,600 Q500,700 400,800 Q300,900 200,800 Q100,700 200,600"
          );
        }
        33% {
          d: path(
            "M220,580 Q340,480 420,620 Q520,740 380,820 Q280,920 180,780 Q80,680 220,580"
          );
        }
        66% {
          d: path(
            "M180,620 Q280,520 380,580 Q480,680 420,780 Q320,880 220,820 Q120,720 180,620"
          );
        }
      }
      .animate-morph-2 {
        animation: morph2 25s ease-in-out infinite;
        animation-delay: -8s;
      }

      /* Particle Float */
      @keyframes particleFloat {
        0%,
        100% {
          opacity: 0;
          transform: translateY(0) translateX(0) scale(1);
        }
        10% {
          opacity: 0.8;
        }
        50% {
          opacity: 0.6;
          transform: translateY(-100px) translateX(20px) scale(1.2);
        }
        90% {
          opacity: 0.4;
        }
        100% {
          opacity: 0;
          transform: translateY(-200px) translateX(-10px) scale(0.8);
        }
      }
      .animate-particle-float {
        animation: particleFloat 15s ease-in-out infinite;
      }

      /* Aurora */
      @keyframes aurora {
        0%,
        100% {
          opacity: 0.5;
          transform: translateX(0) scale(1);
        }
        25% {
          opacity: 0.8;
          transform: translateX(5%) scale(1.05);
        }
        50% {
          opacity: 0.6;
          transform: translateX(-3%) scale(0.98);
        }
        75% {
          opacity: 0.9;
          transform: translateX(2%) scale(1.02);
        }
      }
      .animate-aurora {
        animation: aurora 15s ease-in-out infinite;
      }
      .animate-aurora-delayed {
        animation: aurora 18s ease-in-out infinite;
        animation-delay: -5s;
      }
      .animate-aurora-slow {
        animation: aurora 22s ease-in-out infinite;
        animation-delay: -10s;
      }

      /* Meteor */
      @keyframes meteor {
        0% {
          opacity: 0;
          transform: rotate(35deg) translateY(-100px) translateX(-100px);
        }
        10% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: rotate(35deg) translateY(500px) translateX(500px);
        }
      }
      .animate-meteor {
        animation: meteor 2s ease-in infinite;
      }

      /* Hexagon Float */
      @keyframes hexFloat {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(3deg);
        }
      }
      .animate-hex-float {
        animation: hexFloat 30s ease-in-out infinite;
      }

      /* Wave Animations */
      @keyframes wave1 {
        0%,
        100% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(-25px);
        }
      }
      .animate-wave-1 {
        animation: wave1 10s ease-in-out infinite;
      }

      @keyframes wave2 {
        0%,
        100% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(25px);
        }
      }
      .animate-wave-2 {
        animation: wave2 12s ease-in-out infinite;
        animation-delay: -3s;
      }

      /* Glow Ring */
      @keyframes glowRing {
        0%,
        100% {
          box-shadow:
            0 0 20px rgba(37, 99, 235, 0.3),
            inset 0 0 20px rgba(37, 99, 235, 0.1);
          opacity: 0.3;
        }
        50% {
          box-shadow:
            0 0 60px rgba(37, 99, 235, 0.5),
            inset 0 0 40px rgba(37, 99, 235, 0.2);
          opacity: 0.6;
        }
      }
      .animate-glow-ring {
        animation: glowRing 4s ease-in-out infinite;
      }

      /* Scanning Line */
      @keyframes scanLine {
        0% {
          top: -10%;
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          top: 110%;
          opacity: 0;
        }
      }
      .animate-scan-line {
        animation: scanLine 8s linear infinite;
      }

      /* Rotating Gradient Border */
      @keyframes rotateBorder {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .animate-rotate-border {
        animation: rotateBorder 10s linear infinite;
      }

      /* Data Stream */
      @keyframes dataStream {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 0 1000px;
        }
      }
      .animate-data-stream {
        animation: dataStream 20s linear infinite;
      }

      /* Ripple Effect */
      @keyframes ripple {
        0% {
          transform: scale(0.8);
          opacity: 0.8;
        }
        100% {
          transform: scale(2.5);
          opacity: 0;
        }
      }
      .animate-ripple {
        animation: ripple 3s ease-out infinite;
      }
      .animate-ripple-delayed {
        animation: ripple 3s ease-out infinite;
        animation-delay: -1s;
      }
      .animate-ripple-slow {
        animation: ripple 3s ease-out infinite;
        animation-delay: -2s;
      }
    </style>
